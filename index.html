<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Nexus Flux</title>
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #050510;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* ========= RGB АНИМИРОВАННЫЙ ФОН (как в пустом сайте) ========= */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(125deg, #ff3366, #ff6633, #33ff66, #33ffcc, #3366ff, #cc33ff, #ff33cc);
            background-size: 400% 400%;
            animation: rgbFlow 18s ease infinite;
            filter: brightness(1.1) saturate(1.2);
        }

        .overlay-dark {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.7) 100%);
            backdrop-filter: blur(2px);
            z-index: -1;
            pointer-events: none;
        }

        .rgb-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(70px);
            opacity: 0.55;
            z-index: -1;
            animation: floatOrb 22s infinite alternate ease-in-out;
            pointer-events: none;
        }
        .orb1 { width: 45vw; height: 45vw; background: radial-gradient(circle, rgba(255,80,120,0.8), rgba(255,40,200,0.4)); top: 10%; left: -15%; animation-duration: 24s; }
        .orb2 { width: 55vw; height: 55vw; background: radial-gradient(circle, rgba(80,255,180,0.7), rgba(0,200,255,0.3)); bottom: -20%; right: -20%; animation-duration: 28s; animation-delay: -5s; }
        .orb3 { width: 35vw; height: 35vw; background: radial-gradient(circle, rgba(255,220,80,0.9), rgba(255,80,80,0.5)); top: 50%; left: 60%; animation-duration: 30s; animation-delay: -10s; filter: blur(90px); }

        @keyframes rgbFlow {
            0% { background-position: 0% 50%; }
            25% { background-position: 50% 100%; }
            50% { background-position: 100% 50%; }
            75% { background-position: 50% 0%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes floatOrb {
            0% { transform: translate(0,0) scale(1); opacity:0.4; }
            100% { transform: translate(8%,12%) scale(1.1); opacity:0.7; }
        }

        /* ========= СТИЛИ РЕГИСТРАЦИИ (RGB Void) ========= */
        .glass-stage {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 460px;
            margin: 2rem;
            padding: 1rem;
        }
        .rgb-border-wrap {
            background: linear-gradient(135deg, #ff0000, #ff7700, #ffff00, #00ff88, #0088ff, #ff00cc, #ff0000);
            background-size: 300% 300%;
            animation: borderGlow 6s ease infinite alternate;
            padding: 3px;
            border-radius: 48px;
            transition: all 0.4s;
            box-shadow: 0 25px 40px -15px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.1);
        }
        .glass-card {
            background: rgba(12,12,25,0.55);
            backdrop-filter: blur(16px);
            border-radius: 46px;
            padding: 2rem 1.8rem;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .symbolic-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 0 8px rgba(255,255,200,0.6));
            animation: gentlePulse 3s infinite alternate;
        }
        h1 {
            font-size: 2.4rem;
            font-weight: 700;
            background: linear-gradient(120deg, #fff, #ffaaff, #aaffff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            animation: textShift 8s linear infinite;
        }
        .sub {
            color: rgba(255,255,245,0.9);
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
        .gradient-divider {
            width: 100px;
            height: 3px;
            background: linear-gradient(90deg, #ff3366, #33ff66, #3366ff, #ff33cc);
            margin: 1rem auto;
            border-radius: 3px;
            animation: widthPulse 2.5s infinite alternate;
        }
        .social-buttons {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            margin: 1.5rem 0;
            flex-wrap: wrap;
        }
        .social-btn {
            background: rgba(30,30,55,0.8);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 0.6rem 1rem;
            border-radius: 50px;
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .social-btn:hover {
            background: rgba(50,50,80,0.9);
            border-color: #ff66aa;
            transform: translateY(-2px);
        }
        .error-msg {
            color: #ff8888;
            font-size: 0.8rem;
            margin-top: 0.5rem;
        }
        .rgb-dots {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin: 1.5rem 0 0.5rem;
        }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff3366;
            animation: dotRGB 2s infinite alternate;
        }
        .dot:nth-child(2) { animation-delay: 0.4s; background: #33ff66; }
        .dot:nth-child(3) { animation-delay: 0.8s; background: #33aaff; }
        .dot:nth-child(4) { animation-delay: 1.2s; background: #ff66cc; }

        @keyframes borderGlow {
            0% { background-position: 0% 50%; filter: hue-rotate(0deg);}
            100% { background-position: 100% 50%; filter: hue-rotate(15deg);}
        }
        @keyframes gentlePulse {
            0% { transform: scale(0.96); text-shadow: 0 0 2px cyan;}
            100% { transform: scale(1.04); text-shadow: 0 0 20px magenta;}
        }
        @keyframes textShift {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }
        @keyframes widthPulse {
            0% { width: 60px; opacity:0.6; }
            100% { width: 140px; opacity:1; }
        }
        @keyframes dotRGB {
            0% { transform: scale(0.7); background: #ff3366; }
            100% { transform: scale(1.5); background: #ff99cc; }
        }

        /* ========= ОСНОВНОЙ ЧАТ (TELEGRAM‑STYLE) ========= */
        .messenger-container {
            width: 100%;
            max-width: 1400px;
            height: 90vh;
            margin: 1rem;
            background: rgba(18,18,35,0.55);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            border: 1px solid rgba(255,255,255,0.2);
            display: flex;
            overflow: hidden;
            position: relative;
            z-index: 10;
        }
        .chats-sidebar {
            width: 300px;
            background: rgba(0,0,0,0.3);
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
        }
        .user-header {
            padding: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #ff9966, #ff5e62);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            color: white;
        }
        .user-info {
            flex: 1;
        }
        .username {
            font-weight: 600;
            color: white;
            font-size: 0.9rem;
        }
        .logout-btn {
            background: rgba(255,70,70,0.2);
            border: 1px solid rgba(255,100,100,0.4);
            padding: 0.3rem 0.7rem;
            border-radius: 40px;
            color: #ffb7b7;
            cursor: pointer;
            font-size: 0.75rem;
        }
        .sidebar-tabs {
            display: flex;
            padding: 0.5rem;
            gap: 0.3rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar-tab {
            flex: 1;
            background: none;
            border: none;
            padding: 0.5rem;
            border-radius: 1rem;
            color: #aaa;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
        }
        .sidebar-tab.active {
            background: rgba(59,110,255,0.3);
            color: white;
        }
        .search-box {
            padding: 0.8rem;
        }
        .search-input {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            color: white;
            outline: none;
        }
        .contacts-list, .channels-list, .groups-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }
        .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.7rem;
            border-radius: 1rem;
            cursor: pointer;
            transition: 0.1s;
        }
        .contact-item:hover, .contact-item.active {
            background: rgba(255,255,255,0.1);
        }
        .contact-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1rem;
            color: white;
            position: relative;
        }
        .contact-status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #2ecc71;
            position: absolute;
            bottom: 2px;
            right: 2px;
            border: 2px solid #0f0f1a;
        }
        .contact-info {
            flex: 1;
        }
        .contact-name {
            font-weight: 500;
            color: #eee;
        }
        .contact-preview {
            font-size: 0.7rem;
            color: #aaa;
        }
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            padding: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0,0,0,0.2);
        }
        .back-button {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
        }
        .chat-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #555;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .chat-info h3 {
            font-size: 1rem;
            color: white;
        }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        .message {
            display: flex;
            flex-direction: column;
            max-width: 70%;
        }
        .message.own {
            align-self: flex-end;
            align-items: flex-end;
        }
        .message-bubble {
            background: rgba(30,30,50,0.8);
            padding: 0.5rem 1rem;
            border-radius: 1.2rem;
            color: white;
            word-break: break-word;
        }
        .message.own .message-bubble {
            background: linear-gradient(95deg, #3b6eff, #9a3bff);
        }
        .message-meta {
            font-size: 0.65rem;
            color: #aaa;
            margin-top: 0.2rem;
            display: flex;
            gap: 0.5rem;
        }
        .message-input-area {
            padding: 1rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 0.5rem;
        }
        .message-input {
            flex: 1;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 2rem;
            padding: 0.7rem 1rem;
            color: white;
            outline: none;
        }
        .send-btn {
            background: linear-gradient(95deg, #3b6eff, #9a3bff);
            border: none;
            width: 40px;
            border-radius: 2rem;
            color: white;
            cursor: pointer;
        }
        .empty-messages {
            text-align: center;
            color: #aaa;
            padding: 2rem;
        }
        @media (max-width: 700px) {
            .chats-sidebar { width: 80px; }
            .contact-info, .contact-preview, .user-info, .sidebar-tab span { display: none; }
            .sidebar-tab i { font-size: 1.2rem; }
            .back-button { display: block; }
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>
    <div class="overlay-dark"></div>
    <div class="rgb-orb orb1"></div>
    <div class="rgb-orb orb2"></div>
    <div class="rgb-orb orb3"></div>

    <div id="appRoot"></div>

    <script>
        // ------------------- DATA -------------------
        let users = [];           // { username, provider, avatarLetter }
        let messages = [];        // { id, type, target, sender, text, timestamp }
        let currentUser = null;
        let currentConversation = null; // { type, id }  type: 'dm' or 'channel', id: username or channel name

        const channels = [
            { id: 'general', name: '# general', icon: 'fa-globe' },
            { id: 'tech', name: '# tech', icon: 'fa-code' },
            { id: 'random', name: '# random', icon: 'fa-music' }
        ];

        // Storage keys
        const STORAGE_USERS = 'rgb_messenger_users';
        const STORAGE_MESSAGES = 'rgb_messenger_messages';
        const STORAGE_CURRENT_USER = 'rgb_messenger_currentUser';

        function loadData() {
            const storedUsers = localStorage.getItem(STORAGE_USERS);
            if (storedUsers) {
                users = JSON.parse(storedUsers);
            } else {
                // Predefined users list
                users = [
                    { username: 'Alex_RGB', provider: 'local', avatarLetter: 'A' },
                    { username: 'Maria_Spark', provider: 'local', avatarLetter: 'M' },
                    { username: 'PixelMaster', provider: 'local', avatarLetter: 'P' },
                    { username: 'NeonLight', provider: 'local', avatarLetter: 'N' },
                    { username: 'Dmitry', provider: 'local', avatarLetter: 'D' },
                    { username: 'ElenaWave', provider: 'local', avatarLetter: 'E' }
                ];
                saveUsers();
            }

            const storedMessages = localStorage.getItem(STORAGE_MESSAGES);
            if (storedMessages) {
                messages = JSON.parse(storedMessages);
            } else {
                // Demo messages
                messages = [
                    { id: Date.now()+1, type: 'channel', target: 'general', sender: 'Alex_RGB', text: 'Welcome to RGB Orbit! 🔥 Telegram‑style community.', timestamp: new Date(Date.now()-7200000).toISOString() },
                    { id: Date.now()+2, type: 'channel', target: 'tech', sender: 'NeonLight', text: 'Anyone into WebGL animations?', timestamp: new Date(Date.now()-3600000).toISOString() },
                    { id: Date.now()+3, type: 'dm', target: 'Maria_Spark', sender: 'Alex_RGB', text: 'Hey Maria! How are you?', timestamp: new Date(Date.now()-1800000).toISOString() },
                    { id: Date.now()+4, type: 'dm', target: 'Alex_RGB', sender: 'Maria_Spark', text: 'Hi Alex! I\'m great, enjoying the RGB vibes.', timestamp: new Date(Date.now()-1500000).toISOString() }
                ];
                saveMessages();
            }

            const savedUser = localStorage.getItem(STORAGE_CURRENT_USER);
            if (savedUser) currentUser = JSON.parse(savedUser);
            else currentUser = null;
        }

        function saveUsers() { localStorage.setItem(STORAGE_USERS, JSON.stringify(users)); }
        function saveMessages() { localStorage.setItem(STORAGE_MESSAGES, JSON.stringify(messages)); }
        function saveCurrentUser() {
            if (currentUser) localStorage.setItem(STORAGE_CURRENT_USER, JSON.stringify(currentUser));
            else localStorage.removeItem(STORAGE_CURRENT_USER);
        }

        function isUsernameUnique(username) {
            return !users.some(u => u.username.toLowerCase() === username.toLowerCase());
        }

        // Social login simulation: choose username, create user
        function socialLogin(provider) {
            let suggested = provider + '_' + Math.floor(Math.random() * 1000);
            let finalUsername = prompt(`✨ ${provider} login\nChoose a unique username:`, suggested);
            if (!finalUsername) return;
            finalUsername = finalUsername.trim();
            if (!isUsernameUnique(finalUsername)) {
                alert('Username already taken. Try another.');
                return;
            }
            const newUser = {
                username: finalUsername,
                provider: provider,
                avatarLetter: finalUsername.charAt(0).toUpperCase()
            };
            users.push(newUser);
            saveUsers();
            currentUser = newUser;
            saveCurrentUser();
            renderApp();
        }

        function logout() {
            currentUser = null;
            saveCurrentUser();
            renderApp();
        }

        function sendMessage(text) {
            if (!text.trim() || !currentConversation) return;
            const newMsg = {
                id: Date.now(),
                type: currentConversation.type,
                target: currentConversation.id,
                sender: currentUser.username,
                text: text.trim(),
                timestamp: new Date().toISOString()
            };
            messages.push(newMsg);
            saveMessages();
            renderCurrentChat();
            // Update contact list previews (by re-rendering sidebar)
            renderSidebar();
        }

        function getMessagesForConversation(type, target) {
            return messages.filter(m => m.type === type && m.target === target)
                .sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
        }

        function renderCurrentChat() {
            const chatArea = document.getElementById('chatAreaDynamic');
            if (!chatArea) return;
            if (!currentConversation) {
                chatArea.innerHTML = '<div class="empty-messages">✨ Select a chat to start messaging</div>';
                return;
            }

            const msgs = getMessagesForConversation(currentConversation.type, currentConversation.id);
            let messagesHtml = '';
            if (msgs.length === 0) {
                messagesHtml = '<div class="empty-messages">💬 No messages yet. Be the first!</div>';
            } else {
                msgs.forEach(msg => {
                    const isOwn = msg.sender === currentUser.username;
                    const time = new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                    messagesHtml += `
                        <div class="message ${isOwn ? 'own' : ''}">
                            <div class="message-bubble">${escapeHtml(msg.text)}</div>
                            <div class="message-meta">
                                <span>${escapeHtml(msg.sender)}</span>
                                <span>${time}</span>
                            </div>
                        </div>
                    `;
                });
            }

            let headerTitle = '';
            if (currentConversation.type === 'channel') {
                const ch = channels.find(c => c.id === currentConversation.id);
                headerTitle = ch ? ch.name : currentConversation.id;
            } else {
                headerTitle = '@' + currentConversation.id;
            }

            chatArea.innerHTML = `
                <div class="chat-header">
                    <button class="back-button" id="backBtn"><i class="fas fa-arrow-left"></i></button>
                    <div class="chat-avatar">${currentConversation.type === 'channel' ? '#' : currentConversation.id.charAt(0).toUpperCase()}</div>
                    <div class="chat-info"><h3>${escapeHtml(headerTitle)}</h3></div>
                </div>
                <div class="messages-container" id="messagesContainer">
                    ${messagesHtml}
                </div>
                <div class="message-input-area">
                    <input type="text" id="messageInput" class="message-input" placeholder="Type a message...">
                    <button id="sendMsgBtn" class="send-btn"><i class="fas fa-paper-plane"></i></button>
                </div>
            `;

            const input = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendMsgBtn');
            const backBtn = document.getElementById('backBtn');
            if (input && sendBtn) {
                const send = () => { if(input.value.trim()) sendMessage(input.value); input.value = ''; };
                sendBtn.onclick = send;
                input.onkeypress = (e) => { if(e.key === 'Enter') send(); };
            }
            if (backBtn) {
                backBtn.onclick = () => {
                    currentConversation = null;
                    renderCurrentChat();
                    renderSidebar();
                    // On mobile, we could show sidebar again – but we just rerender.
                };
            }
            const container = document.getElementById('messagesContainer');
            if (container) container.scrollTop = container.scrollHeight;
        }

        function renderSidebar() {
            const sidebar = document.getElementById('sidebarDynamic');
            if (!sidebar) return;

            // Get active tab (chats/channels/groups)
            let activeTab = 'chats';
            const activeTabEl = document.querySelector('.sidebar-tab.active');
            if (activeTabEl) activeTab = activeTabEl.getAttribute('data-tab');

            // Build contacts list (all users except current)
            const otherUsers = users.filter(u => u.username !== currentUser.username);
            let contactsHtml = '';
            otherUsers.forEach(u => {
                // last message preview
                const lastMsg = messages.filter(m => (m.type === 'dm' && (m.target === u.username || (m.sender === u.username && m.target === currentUser.username))))
                    .sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp))[0];
                const preview = lastMsg ? (lastMsg.sender === currentUser.username ? 'You: ' : '') + lastMsg.text.substring(0,30) : 'New conversation';
                const activeClass = (currentConversation && currentConversation.type === 'dm' && currentConversation.id === u.username) ? 'active' : '';
                contactsHtml += `
                    <div class="contact-item ${activeClass}" data-type="dm" data-id="${u.username}">
                        <div class="contact-avatar">
                            ${u.avatarLetter}
                            <div class="contact-status" style="background: ${Math.random() > 0.5 ? '#2ecc71' : '#aaa'}"></div>
                        </div>
                        <div class="contact-info">
                            <div class="contact-name">${escapeHtml(u.username)}</div>
                            <div class="contact-preview">${escapeHtml(preview)}</div>
                        </div>
                    </div>
                `;
            });

            // Channels list
            let channelsHtml = '';
            channels.forEach(ch => {
                const lastMsg = messages.filter(m => m.type === 'channel' && m.target === ch.id)
                    .sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp))[0];
                const preview = lastMsg ? lastMsg.text.substring(0,30) : 'No messages yet';
                const activeClass = (currentConversation && currentConversation.type === 'channel' && currentConversation.id === ch.id) ? 'active' : '';
                channelsHtml += `
                    <div class="contact-item ${activeClass}" data-type="channel" data-id="${ch.id}">
                        <div class="contact-avatar" style="background:#3b6eff;">#</div>
                        <div class="contact-info">
                            <div class="contact-name">${ch.name}</div>
                            <div class="contact-preview">${escapeHtml(preview)}</div>
                        </div>
                    </div>
                `;
            });

            // Groups (empty for demo)
            const groupsHtml = `<div class="empty-messages" style="text-align:center; padding:1rem;">👥 Groups coming soon</div>`;

            let listHtml = '';
            if (activeTab === 'chats') listHtml = contactsHtml;
            else if (activeTab === 'channels') listHtml = channelsHtml;
            else listHtml = groupsHtml;

            sidebar.innerHTML = `
                <div class="user-header">
                    <div class="avatar">${currentUser.avatarLetter}</div>
                    <div class="user-info">
                        <div class="username">@${currentUser.username}</div>
                    </div>
                    <button id="logoutSidebarBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i></button>
                </div>
                <div class="sidebar-tabs">
                    <button class="sidebar-tab ${activeTab === 'chats' ? 'active' : ''}" data-tab="chats"><i class="fas fa-comment"></i><span> Chats</span></button>
                    <button class="sidebar-tab ${activeTab === 'channels' ? 'active' : ''}" data-tab="channels"><i class="fas fa-bullhorn"></i><span> Channels</span></button>
                    <button class="sidebar-tab ${activeTab === 'groups' ? 'active' : ''}" data-tab="groups"><i class="fas fa-users"></i><span> Groups</span></button>
                </div>
                <div class="search-box">
                    <input type="text" class="search-input" id="searchInput" placeholder="Search...">
                </div>
                <div class="contacts-list" id="contactsList">
                    ${listHtml}
                </div>
            `;

            // Attach tab switching
            document.querySelectorAll('.sidebar-tab').forEach(tab => {
                tab.addEventListener('click', (e) => {
                    const tabId = tab.getAttribute('data-tab');
                    document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    renderSidebar(); // re-render with new active tab
                });
            });

            // Attach click events on contacts/channels
            document.querySelectorAll('.contact-item').forEach(el => {
                el.addEventListener('click', () => {
                    const type = el.getAttribute('data-type');
                    const id = el.getAttribute('data-id');
                    if (type && id) {
                        currentConversation = { type, id };
                        renderCurrentChat();
                        renderSidebar(); // update active highlight
                    }
                });
            });

            // Search functionality (filter contacts/channels)
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    const term = e.target.value.toLowerCase();
                    const items = document.querySelectorAll('.contact-item');
                    items.forEach(item => {
                        const name = item.querySelector('.contact-name')?.innerText.toLowerCase() || '';
                        if (name.includes(term)) item.style.display = 'flex';
                        else item.style.display = 'none';
                    });
                });
            }

            const logoutBtn = document.getElementById('logoutSidebarBtn');
            if (logoutBtn) logoutBtn.onclick = () => logout();
        }

        function renderMessenger() {
            return `
                <div class="messenger-container">
                    <div class="chats-sidebar" id="sidebarDynamic"></div>
                    <div class="chat-area" id="chatAreaDynamic"></div>
                </div>
            `;
        }

        function renderRegistration() {
            return `
                <div class="glass-stage">
                    <div class="rgb-border-wrap">
                        <div class="glass-card">
                            <div class="symbolic-icon">✦</div>
                            <h1>RGB Orbit</h1>
                            <div class="sub">Telegram‑style • channels • DMs</div>
                            <div class="gradient-divider"></div>
                            <div class="social-buttons">
                                <div id="googleLogin" class="social-btn"><i class="fab fa-google"></i> Google</div>
                                <div id="discordLogin" class="social-btn"><i class="fab fa-discord"></i> Discord</div>
                                <div id="telegramLogin" class="social-btn"><i class="fab fa-telegram"></i> Telegram</div>
                                <div id="githubLogin" class="social-btn"><i class="fab fa-github"></i> GitHub</div>
                            </div>
                            <div class="rgb-dots">
                                <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
                            </div>
                            <div style="font-size:0.7rem; opacity:0.7; margin-top:1rem;">✨ unique usernames • animated RGB • live chat</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderApp() {
            const appDiv = document.getElementById('appRoot');
            if (!currentUser) {
                appDiv.innerHTML = renderRegistration();
                attachRegistrationEvents();
            } else {
                appDiv.innerHTML = renderMessenger();
                renderSidebar();
                if (!currentConversation) {
                    // default to first channel
                    currentConversation = { type: 'channel', id: 'general' };
                    renderCurrentChat();
                    renderSidebar();
                } else {
                    renderCurrentChat();
                }
            }
        }

        function attachRegistrationEvents() {
            const google = document.getElementById('googleLogin');
            const discord = document.getElementById('discordLogin');
            const telegram = document.getElementById('telegramLogin');
            const github = document.getElementById('githubLogin');
            if (google) google.onclick = () => socialLogin('Google');
            if (discord) discord.onclick = () => socialLogin('Discord');
            if (telegram) telegram.onclick = () => socialLogin('Telegram');
            if (github) github.onclick = () => socialLogin('GitHub');
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Init
        loadData();
        renderApp();
    </script>
</body>
</html>
