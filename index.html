        /* RGB animated background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(125deg, #ff3366, #ff6633, #33ff66, #33ffcc, #3366ff, #cc33ff, #ff33cc);
            background-size: 400% 400%;
            animation: rgbFlow 18s ease infinite;
            filter: brightness(1.1) saturate(1.2);
        }
        .overlay-dark {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.7) 100%);
            backdrop-filter: blur(2px);
            z-index: -1;
            pointer-events: none;
        }
        .rgb-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(70px);
            opacity: 0.55;
            z-index: -1;
            animation: floatOrb 22s infinite alternate ease-in-out;
            pointer-events: none;
        }
        .orb1 { width: 45vw; height: 45vw; background: radial-gradient(circle, rgba(255,80,120,0.8), rgba(255,40,200,0.4)); top: 10%; left: -15%; animation-duration: 24s; }
        .orb2 { width: 55vw; height: 55vw; background: radial-gradient(circle, rgba(80,255,180,0.7), rgba(0,200,255,0.3)); bottom: -20%; right: -20%; animation-duration: 28s; animation-delay: -5s; }
        .orb3 { width: 35vw; height: 35vw; background: radial-gradient(circle, rgba(255,220,80,0.9), rgba(255,80,80,0.5)); top: 50%; left: 60%; animation-duration: 30s; animation-delay: -10s; filter: blur(90px); }

            0% { background-position: 0% 50%; }

            50% { background-position: 100% 50%; }
            75% { background-position: 50% 0%; }
            100% { background-position: 0% 50%; }

        @keyframes floatOrb {
            0% { transform: translate(0,0) scale(1); opacity:0.4; }
            100% { transform: translate(8%,12%) scale(1.1); opacity:0.7; }

        const STORAGE_USERS = 'rgb_messenger_users';
        const STORAGE_MESSAGES = 'rgb_messenger_messages';
        const STORAGE_CURRENT_USER = 'rgb_messenger_currentUser';
        const STORAGE_SETTINGS = 'rgb_messenger_settings';

        // Загрузка настроек
        function loadSettings() {
            const settings = localStorage.getItem(STORAGE_SETTINGS);
            if (settings) {
                const s = JSON.parse(settings);
                soundEnabled = s.sound !== undefined ? s.sound : true;
                notificationsEnabled = s.notifications !== undefined ? s.notifications : true;
            }
        }
        function saveSettings() {
            localStorage.setItem(STORAGE_SETTINGS, JSON.stringify({ sound: soundEnabled, notifications: notificationsEnabled }));
        }

        function loadData() {
            const storedUsers = localStorage.getItem(STORAGE_USERS);
            if (storedUsers) users = JSON.parse(storedUsers);
            else {
                users = [
                    { username: "Alex_RGB", email: "alex@example.com", displayName: "Alex RGB", avatarUrl: null, bio: "RGB lover", firebaseUid: null, settings: { notifications: true, sound: true }, isAdmin: false },
                    { username: "Maria_Spark", email: "maria@example.com", displayName: "Maria Spark", avatarUrl: null, bio: "Sparkling", firebaseUid: null, settings: { notifications: true, sound: true }, isAdmin: false },
                    { username: "NeonLight", email: "neon@example.com", displayName: "NeonLight", avatarUrl: null, bio: "Neon vibes", firebaseUid: null, settings: { notifications: true, sound: true }, isAdmin: false }
                ];
                saveUsers();
            }
            const storedMessages = localStorage.getItem(STORAGE_MESSAGES);
            if (storedMessages) {
                messages = JSON.parse(storedMessages);
                messages.forEach(msg => {
                    if (msg.likedBy === undefined) msg.likedBy = [];
                    if (msg.likes === undefined) msg.likes = 0;
                    if (msg.edited === undefined) msg.edited = false;
                });
                saveMessages();
            } else {
                messages = [
                    { id: Date.now()+1, type: 'channel', target: 'general', sender: 'Alex_RGB', text: 'Welcome to RGB Orbit! 🔥', timestamp: new Date(Date.now()-7200000).toISOString(), likes: 2, likedBy: [], edited: false, reactions: {} },
                    { id: Date.now()+2, type: 'channel', target: 'tech', sender: 'NeonLight', text: 'Anyone into WebGL?', timestamp: new Date(Date.now()-3600000).toISOString(), likes: 1, likedBy: [], edited: false, reactions: {} }
                ];
                saveMessages();
            }
            const savedUser = localStorage.getItem(STORAGE_CURRENT_USER);
            if (savedUser) currentUser = JSON.parse(savedUser);
            else currentUser = null;
        }

        function saveUsers() { localStorage.setItem(STORAGE_USERS, JSON.stringify(users)); }
        function saveMessages() { localStorage.setItem(STORAGE_MESSAGES, JSON.stringify(messages)); }
        function saveCurrentUser() {
            if (currentUser) localStorage.setItem(STORAGE_CURRENT_USER, JSON.stringify(currentUser));
            else localStorage.removeItem(STORAGE_CURRENT_USER);
        }

        function isUsernameUnique(username) {
            return !users.some(u => u.username.toLowerCase() === username.toLowerCase());
        }

        function generateUniqueUsername(base) {
            let username = base;
            let counter = 1;
            while (!isUsernameUnique(username)) {
                username = base + '_' + counter;
                counter++;
            }
            return username;
        }

        function createLocalUser(username, email, displayName, avatarUrl, firebaseUid, isAdmin = false) {
            if (!username || username.trim() === '') return false;
            let finalUsername = username.trim();
            if (!isUsernameUnique(finalUsername)) {
                finalUsername = generateUniqueUsername(finalUsername);
            }
            const newUser = {
                username: finalUsername,
                email,
                displayName: displayName || finalUsername,
                avatarUrl: avatarUrl || null,
                bio: '',
                firebaseUid,
                settings: { notifications: true, sound: true },
                isAdmin: isAdmin || (email === "mr.danielus1358@gmail.com")
            };
            users.push(newUser);
            saveUsers();
            currentUser = newUser;
            saveCurrentUser();
            renderApp();
            return true;
        }

        async function handleSocialLogin(firebaseUser) {
            let existingUser = users.find(u => u.firebaseUid === firebaseUser.uid);
            if (existingUser) {
                currentUser = existingUser;
                saveCurrentUser();
                renderApp();
                return;
            }
            existingUser = users.find(u => u.email === firebaseUser.email);
            if (existingUser) {
                existingUser.firebaseUid = firebaseUser.uid;
                saveUsers();
                currentUser = existingUser;
                saveCurrentUser();
                renderApp();
                return;
            }
            let baseUsername = firebaseUser.displayName ? firebaseUser.displayName.replace(/\s/g, '_') : firebaseUser.email.split('@')[0];
            createLocalUser(baseUsername, firebaseUser.email, firebaseUser.displayName, firebaseUser.photoURL, firebaseUser.uid);
        }

        async function firebaseGoogleLogin() {
            try {
                const result = await signInWithPopup(auth, googleProvider);
                await handleSocialLogin(result.user);
            } catch (err) {
                alert("Google login failed: " + err.message);
            }
        }

        async function firebaseGithubLogin() {
            try {
                const result = await signInWithPopup(auth, githubProvider);
                await handleSocialLogin(result.user);
            } catch (err) {
                alert("GitHub login failed: " + err.message);
            }
        }

        async function registerWithEmail(email, username, password) {
            if (!email || !username || !password) {
                alert("Fill all fields");
                return;
            }
            if (!isUsernameUnique(username)) {
                alert("Username already taken");
                return;
            }
            try {
                const cred = await createUserWithEmailAndPassword(auth, email, password);
                const firebaseUser = cred.user;
                await updateProfile(firebaseUser, { displayName: username });
                createLocalUser(username, email, username, null, firebaseUser.uid, email === "mr.danielus1358@gmail.com");
            } catch (err) {
                alert("Registration error: " + err.message);
            }
        }

        async function loginWithEmail(email, password) {
            if (!email || !password) {
                alert("Enter email and password");
                return;
            }
            try {
                const cred = await signInWithEmailAndPassword(auth, email, password);
                const firebaseUser = cred.user;
                let existingUser = users.find(u => u.firebaseUid === firebaseUser.uid);
                if (existingUser) {
                    currentUser = existingUser;
                    saveCurrentUser();
                    renderApp();
                } else {
                    const username = firebaseUser.displayName || email.split('@')[0];
                    createLocalUser(username, email, username, firebaseUser.photoURL, firebaseUser.uid, email === "mr.danielus1358@gmail.com");
                }
            } catch (err) {
                alert("Login error: " + err.message);
            }
        }

        function logout() {
            auth.signOut();
            if (pollingInterval) clearInterval(pollingInterval);
            currentUser = null;
            saveCurrentUser();
            renderApp();
        }

        async function deleteAccount() {
            if (!confirm("⚠️ Delete your account permanently? All messages will be lost.")) return;
            try {
                const user = auth.currentUser;
                if (user) await deleteUser(user);
            } catch (err) {
                console.warn("Firebase delete error:", err);
            }
            users = users.filter(u => u.username !== currentUser.username);
            messages = messages.filter(m => m.sender !== currentUser.username);
            saveUsers();
            saveMessages();
            currentUser = null;
            saveCurrentUser();
            renderApp();
        }

        // Messaging functions
        function sendMessage(text, imageBase64 = null) {
            if (!text.trim() && !imageBase64) return;
            let finalText = text.trim();
            if (imageBase64) {
                finalText += (finalText ? '\n' : '') + `[Image](${imageBase64})`; // простой маркер
            }
            const newMsg = {
                id: Date.now(),
                type: currentConversation.type,
                target: currentConversation.id,
                sender: currentUser.username,
                text: finalText,
                timestamp: new Date().toISOString(),
                likes: 0,
                likedBy: [],
                edited: false,
                reactions: {}
            };
            messages.push(newMsg);
            saveMessages();
            playSound();
            renderCurrentChat();
            renderSidebar();
            triggerStorageEvent();
        }

        function playSound() {
            if (soundEnabled) {
                const audio = new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3');
                audio.volume = 0.3;
                audio.play().catch(e => console.log("Audio play failed"));
            }
        }

        function triggerStorageEvent() {
            localStorage.setItem('__sync', Date.now().toString());
            localStorage.removeItem('__sync');
        }

        window.addEventListener('storage', (e) => {
            if (e.key === STORAGE_MESSAGES || e.key === STORAGE_USERS || e.key === '__sync') {
                loadData();
                if (currentConversation) renderCurrentChat();
                renderSidebar();
            }
        });

        function deleteMessage(msgId) {
            const index = messages.findIndex(m => m.id === msgId);
            if (index !== -1 && messages[index].sender === currentUser.username) {
                messages.splice(index, 1);
                saveMessages();
                renderCurrentChat();
                renderSidebar();
                triggerStorageEvent();
            }
        }

        function editMessage(msgId, newText) {
            const msg = messages.find(m => m.id === msgId);
            if (msg && msg.sender === currentUser.username && newText.trim()) {
                msg.text = newText.trim();
                msg.edited = true;
                saveMessages();
                renderCurrentChat();
                triggerStorageEvent();
            }
        }

        function toggleLike(msgId) {
            const msg = messages.find(m => m.id === msgId);
            if (!msg) return;
            if (!msg.likedBy) msg.likedBy = [];
            const userId = currentUser.username;
            if (msg.likedBy.includes(userId)) {
                msg.likedBy = msg.likedBy.filter(u => u !== userId);
                msg.likes--;
            } else {
                msg.likedBy.push(userId);
                msg.likes++;
            }
            saveMessages();
            renderCurrentChat();
            triggerStorageEvent();
        }

        function addReaction(msgId, reaction) {
            const msg = messages.find(m => m.id === msgId);
            if (!msg) return;
            if (!msg.reactions) msg.reactions = {};
            const userId = currentUser.username;
            if (msg.reactions[reaction] && msg.reactions[reaction].includes(userId)) {
                msg.reactions[reaction] = msg.reactions[reaction].filter(u => u !== userId);
                if (msg.reactions[reaction].length === 0) delete msg.reactions[reaction];
            } else {
                if (!msg.reactions[reaction]) msg.reactions[reaction] = [];
                msg.reactions[reaction].push(userId);
            }
            saveMessages();
            renderCurrentChat();
            triggerStorageEvent();
        }

        function getMessagesForConversation(type, target) {
            return messages.filter(m => m.type === type && m.target === target)
                .sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
        }

        function renderCurrentChat() {
            const chatArea = document.getElementById('chatAreaDynamic');
            if (!chatArea) return;
            if (!currentConversation) {
                chatArea.innerHTML = '<div class="empty-messages">✨ Select a chat to start messaging</div>';
                return;
            }
            const msgs = getMessagesForConversation(currentConversation.type, currentConversation.id);
            let messagesHtml = '';
            if (msgs.length === 0) messagesHtml = '<div class="empty-messages">💬 No messages yet. Be the first!</div>';
            else {
                msgs.forEach(msg => {
                    const isOwn = msg.sender === currentUser.username;
                    const time = new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                    const likedClass = (msg.likedBy && msg.likedBy.includes(currentUser.username)) ? 'active' : '';
                    // Отображение текста и возможного изображения
                    let displayText = msg.text;
                    const imageMatch = msg.text.match(/\[Image\]\((data:image\/[^;]+;base64,[^)]+)\)/);
                    let imageHtml = '';
                    if (imageMatch) {
                        imageHtml = `<br><img src="${imageMatch[1]}" style="max-width:200px; max-height:200px; border-radius:10px; margin-top:5px;">`;
                        displayText = displayText.replace(/\[Image\]\([^)]+\)/, '');
                    }
                    // Реакции
                    let reactionsHtml = '';
                    if (msg.reactions) {
                        for (const [emoji, users] of Object.entries(msg.reactions)) {
                            const active = users.includes(currentUser.username);
                            reactionsHtml += `<button class="reaction-btn ${active ? 'active' : ''}" data-reaction="${emoji}" data-msg-id="${msg.id}">${emoji} ${users.length}</button>`;
                        }
                    }
                    messagesHtml += `
                        <div class="message ${isOwn ? 'own' : ''}" data-msg-id="${msg.id}">
                            <div class="message-bubble">
                                ${escapeHtml(displayText)}${imageHtml}${msg.edited ? ' <i style="font-size:0.7rem;">(edited)</i>' : ''}
                                <div class="message-actions">
                                    ${isOwn ? `<button class="edit-msg" data-id="${msg.id}"><i class="fas fa-edit"></i></button>` : ''}
                                    ${isOwn ? `<button class="delete-msg" data-id="${msg.id}"><i class="fas fa-trash"></i></button>` : ''}
                                    <button class="like-msg" data-id="${msg.id}"><i class="fas fa-heart ${likedClass}"></i> ${msg.likes || 0}</button>
                                </div>
                            </div>
                            <div class="message-meta">
                                <span>${escapeHtml(msg.sender)}</span>
                                <span>${time}</span>
                                <div class="message-reactions">${reactionsHtml}</div>
                            </div>
                        </div>
                    `;
                });
            }
            let headerTitle = '';
            if (currentConversation.type === 'channel') {
                const ch = channels.find(c => c.id === currentConversation.id);
                headerTitle = ch ? ch.name : currentConversation.id;
            } else {
                headerTitle = '@' + currentConversation.id;
            }
            chatArea.innerHTML = `
                <div class="chat-header">
                    <button class="back-button" id="backBtn"><i class="fas fa-arrow-left"></i></button>
                    <div class="chat-avatar">${currentConversation.type === 'channel' ? '#' : currentConversation.id.charAt(0).toUpperCase()}</div>
                    <div class="chat-info"><h3>${escapeHtml(headerTitle)}</h3></div>
                </div>
                <div class="messages-container" id="messagesContainer">${messagesHtml}</div>
                <div class="message-input-area">
                    <textarea id="messageInput" class="message-input" placeholder="Type a message..."></textarea>
                    <button id="attachImageBtn" class="attach-btn"><i class="fas fa-image"></i></button>
                    <button id="sendMsgBtn" class="send-btn"><i class="fas fa-paper-plane"></i></button>
                </div>
            `;
            const input = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendMsgBtn');
            const backBtn = document.getElementById('backBtn');
            const attachBtn = document.getElementById('attachImageBtn');
            if (input && sendBtn) {
                const send = () => { if(input.value.trim()) sendMessage(input.value); input.value = ''; };
                sendBtn.onclick = send;
                input.onkeypress = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } };
            }
            if (attachBtn) {
                const fileInput = document.createElement('input');
                fileInput.type = 'file';
                fileInput.accept = 'image/*';
                attachBtn.onclick = () => fileInput.click();
                fileInput.onchange = (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (ev) => {
                            sendMessage('', ev.target.result);
                        };
                        reader.readAsDataURL(file);
                    }
                };
            }
            if (backBtn) backBtn.onclick = () => { currentConversation = null; renderCurrentChat(); renderSidebar(); };
            const container = document.getElementById('messagesContainer');
            if (container) container.scrollTop = container.scrollHeight;

            container?.addEventListener('click', (e) => {
                const deleteBtn = e.target.closest('.delete-msg');
                const editBtn = e.target.closest('.edit-msg');
                const likeBtn = e.target.closest('.like-msg');
                const reactionBtn = e.target.closest('.reaction-btn');
                if (deleteBtn) {
                    const id = parseInt(deleteBtn.getAttribute('data-id'));
                    if (id) deleteMessage(id);
                }
                if (editBtn) {
                    const id = parseInt(editBtn.getAttribute('data-id'));
                    if (id) {
                        const newText = prompt('Edit message:', messages.find(m => m.id === id)?.text);
                        if (newText) editMessage(id, newText);
                    }
                }
                if (likeBtn) {
                    const id = parseInt(likeBtn.getAttribute('data-id'));
                    if (id) toggleLike(id);
                }
                if (reactionBtn) {
                    const id = parseInt(reactionBtn.getAttribute('data-msg-id'));
                    const reaction = reactionBtn.getAttribute('data-reaction');
                    if (id && reaction) addReaction(id, reaction);
                }
            });
        }

        function renderSidebar() {
            const sidebar = document.getElementById('sidebarDynamic');
            if (!sidebar) return;

            let mainContent = '';
            if (activeTab === 'chats') {
                const otherUsers = users.filter(u => u.username !== currentUser.username);
                let contactsHtml = '';
                otherUsers.forEach(u => {
                    const lastMsg = messages.filter(m => (m.type === 'dm' && (m.target === u.username || (m.sender === u.username && m.target === currentUser.username))))
                        .sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp))[0];
                    const preview = lastMsg ? (lastMsg.sender === currentUser.username ? 'You: ' : '') + lastMsg.text.substring(0,30) : 'New conversation';
                    const activeClass = (currentConversation && currentConversation.type === 'dm' && currentConversation.id === u.username) ? 'active' : '';
                    contactsHtml += `
                        <div class="contact-item ${activeClass}" data-type="dm" data-id="${u.username}">
                            <div class="contact-avatar" style="background-image: url('${u.avatarUrl || ''}'); background-size: cover;">${!u.avatarUrl ? u.username.charAt(0).toUpperCase() : ''}</div>
                            <div class="contact-info">
                                <div class="contact-name">${escapeHtml(u.displayName || u.username)}</div>
                                <div class="contact-preview">${escapeHtml(preview)}</div>
                            </div>
                        </div>
                    `;
                });
                mainContent = `<div class="contacts-list" id="contactsList">${contactsHtml}</div>`;
            } else if (activeTab === 'channels') {

                    const preview = lastMsg ? lastMsg.text.substring(0,30) : 'No messages yet';
                    const activeClass = (currentConversation && currentConversation.type === 'channel' && currentConversation.id === ch.id) ? 'active' : '';
                    channelsHtml += `
                        <div class="contact-item ${activeClass}" data-type="channel" data-id="${ch.id}">
                            <div class="contact-avatar" style="background:#3b6eff;">#</div>
                            <div class="contact-info">
                                <div class="contact-name">${ch.name}</div>
                                <div class="contact-preview">${escapeHtml(preview)}</div>
                            </div>
                        </div>
                    `;
                });
                mainContent = `<div class="contacts-list">${channelsHtml}</div>`;
            } else {
                mainContent = `<div class="empty-messages" style="text-align:center; padding:1rem;">👥 Groups coming soon</div>`;
            }

            sidebar.innerHTML = `
                <div class="user-header">
                    <button class="burger-menu" id="burgerMenuBtn"><i class="fas fa-bars"></i></button>
                    <div class="avatar" style="background-image: url('${currentUser.avatarUrl || ''}'); background-size: cover;">${!currentUser.avatarUrl ? currentUser.username.charAt(0).toUpperCase() : ''}</div>
                    <div class="user-info">
                        <div class="username">@${currentUser.username}</div>
                    </div>
                </div>
                <div class="sidebar-tabs">
                    <button class="sidebar-tab ${activeTab === 'chats' ? 'active' : ''}" data-tab="chats"><i class="fas fa-comment"></i><span> Chats</span></button>
                    <button class="sidebar-tab ${activeTab === 'channels' ? 'active' : ''}" data-tab="channels"><i class="fas fa-bullhorn"></i><span> Channels</span></button>
                    <button class="sidebar-tab ${activeTab === 'groups' ? 'active' : ''}" data-tab="groups"><i class="fas fa-users"></i><span> Groups</span></button>
                </div>
                <div class="search-box"><input type="text" class="search-input" id="searchInput" placeholder="Search..."></div>
                ${mainContent}
            `;

            document.querySelectorAll('.sidebar-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    activeTab = tab.getAttribute('data-tab');
                    renderSidebar();
                    if (currentConversation) renderCurrentChat();
                });
            });
            document.querySelectorAll('.contact-item').forEach(el => {
                el.addEventListener('click', () => {
                    const type = el.getAttribute('data-type');
                    const id = el.getAttribute('data-id');
                    if (type && id) { currentConversation = { type, id }; renderCurrentChat(); renderSidebar(); }
                });
            });
            const searchInput = document.getElementById('searchInput');
            if (searchInput && (activeTab === 'chats' || activeTab === 'channels')) {
                searchInput.addEventListener('input', (e) => {
                    const term = e.target.value.toLowerCase();
                    document.querySelectorAll('.contact-item').forEach(item => {
                        const name = item.querySelector('.contact-name')?.innerText.toLowerCase() || '';
                        item.style.display = name.includes(term) ? 'flex' : 'none';

                });

                searchInput.style.display = 'none';
            }

            const burgerBtn = document.getElementById('burgerMenuBtn');
            if (burgerBtn) {
                burgerBtn.onclick = () => {
                    const sidebarEl = document.querySelector('.chats-sidebar');
                    if (sidebarEl) sidebarEl.classList.toggle('open');
                };
            }
        }

                    <div class="settings-section">

                        saveMessages();

            if (pollingInterval) clearInterval(pollingInterval);
            pollingInterval = setInterval(() => {
                if (currentConversation) {
                    renderCurrentChat();
                }
                renderSidebar();
            }, 2000);
        }

        }

        function renderAuthScreen() {
            let mode = 'login';
            function switchMode() {
                mode = mode === 'login' ? 'register' : 'login';
                renderAuthScreen();
            }
            const isLogin = mode === 'login';
            return `
                <div class="glass-stage">
                    <div class="rgb-border-wrap">
                        <div class="glass-card">

                            <h1>RGB Orbit</h1>
                            <div class="sub">${isLogin ? 'Sign in to continue' : 'Create new account'}</div>
                            <div class="gradient-divider"></div>
                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" id="authEmail" class="form-input" placeholder="your@email.com">
                            </div>
                            ${!isLogin ? `<div class="form-group"><label>Username</label><input type="text" id="authUsername" class="form-input" placeholder="Username"></div>` : ''}
                            <div class="form-group">
                                <label>Password</label>
                                <input type="password" id="authPassword" class="form-input" placeholder="Password">
                            </div>
                            <button id="authSubmitBtn" class="btn-primary">${isLogin ? 'Log In' : 'Register'}</button>
                            <div class="auth-switch">
                                ${isLogin ? "Don't have an account? " : "Already have an account? "}
                                <span id="authSwitchBtn">${isLogin ? 'Register' : 'Log in'}</span>
                            </div>
                            <div class="gradient-divider" style="margin: 1rem auto;"></div>
                            <div class="social-buttons">
                                <div id="googleLoginBtn" class="social-btn"><i class="fab fa-google"></i> Google</div>
                                <div id="githubLoginBtn" class="social-btn"><i class="fab fa-github"></i> GitHub</div>
                            </div>
                            <div class="rgb-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                        </div>
                    </div>
                </div>
            `;
        }

        function attachAuthEvents() {
            const submitBtn = document.getElementById('authSubmitBtn');
            const switchBtn = document.getElementById('authSwitchBtn');
            const googleBtn = document.getElementById('googleLoginBtn');
            const githubBtn = document.getElementById('githubLoginBtn');
            if (submitBtn) {
                submitBtn.onclick = () => {
                    const email = document.getElementById('authEmail').value;
                    const password = document.getElementById('authPassword').value;
                    const isLogin = submitBtn.innerText === 'Log In';
                    if (isLogin) {
                        loginWithEmail(email, password);
                    } else {
                        const username = document.getElementById('authUsername').value;
                        registerWithEmail(email, username, password);
                    }
                };
            }
            if (switchBtn) {
                switchBtn.onclick = () => {
                    const isLogin = submitBtn.innerText === 'Log In';
                    if (isLogin) {
                        document.querySelector('.sub').innerText = 'Create new account';
                        submitBtn.innerText = 'Register';
                        switchBtn.innerText = 'Log in';
                        const formGroup = document.createElement('div');
                        formGroup.className = 'form-group';
                        formGroup.innerHTML = '<label>Username</label><input type="text" id="authUsername" class="form-input" placeholder="Username">';
                        document.getElementById('authEmail').parentNode.insertAdjacentElement('afterend', formGroup);
                    } else {
                        document.querySelector('.sub').innerText = 'Sign in to continue';
                        submitBtn.innerText = 'Log In';
                        switchBtn.innerText = 'Register';
                        const usernameField = document.getElementById('authUsername')?.parentNode;
                        if (usernameField) usernameField.remove();
                    }
                };
            }
            if (googleBtn) googleBtn.onclick = firebaseGoogleLogin;
            if (githubBtn) githubBtn.onclick = firebaseGithubLogin;
        }

        function renderApp() {
            const appDiv = document.getElementById('appRoot');
            if (!currentUser) {
                if (pollingInterval) clearInterval(pollingInterval);
                appDiv.innerHTML = renderAuthScreen();
                attachAuthEvents();
            } else {
                appDiv.innerHTML = renderMessenger();
                renderSidebar();
                if (!currentConversation) {
                    currentConversation = { type: 'channel', id: 'general' };
                    renderCurrentChat();
                    renderSidebar();
                } else renderCurrentChat();
                startPolling();
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
        }

        loadSettings();
        loadData();
        renderApp();
    </script>
</body>
</html>
