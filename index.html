<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>RGB Orbit | Telegram‑style Messenger</title>
    <!-- Firebase (модульный) -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js"
            }
        }
    </script>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #050510;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* ========= RGB АНИМИРОВАННЫЙ ФОН ========= */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(125deg, #ff3366, #ff6633, #33ff66, #33ffcc, #3366ff, #cc33ff, #ff33cc);
            background-size: 400% 400%;
            animation: rgbFlow 18s ease infinite;
            filter: brightness(1.1) saturate(1.2);
        }
        .overlay-dark {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.7) 100%);
            backdrop-filter: blur(2px);
            z-index: -1;
            pointer-events: none;
        }
        .rgb-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(70px);
            opacity: 0.55;
            z-index: -1;
            animation: floatOrb 22s infinite alternate ease-in-out;
            pointer-events: none;
        }
        .orb1 { width: 45vw; height: 45vw; background: radial-gradient(circle, rgba(255,80,120,0.8), rgba(255,40,200,0.4)); top: 10%; left: -15%; animation-duration: 24s; }
        .orb2 { width: 55vw; height: 55vw; background: radial-gradient(circle, rgba(80,255,180,0.7), rgba(0,200,255,0.3)); bottom: -20%; right: -20%; animation-duration: 28s; animation-delay: -5s; }
        .orb3 { width: 35vw; height: 35vw; background: radial-gradient(circle, rgba(255,220,80,0.9), rgba(255,80,80,0.5)); top: 50%; left: 60%; animation-duration: 30s; animation-delay: -10s; filter: blur(90px); }

        @keyframes rgbFlow {
            0% { background-position: 0% 50%; }
            25% { background-position: 50% 100%; }
            50% { background-position: 100% 50%; }
            75% { background-position: 50% 0%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes floatOrb {
            0% { transform: translate(0,0) scale(1); opacity:0.4; }
            100% { transform: translate(8%,12%) scale(1.1); opacity:0.7; }
        }

        /* ========= СТИЛИ РЕГИСТРАЦИИ (RGB Void) ========= */
        .glass-stage {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 480px;
            margin: 2rem;
            padding: 1rem;
        }
        .rgb-border-wrap {
            background: linear-gradient(135deg, #ff0000, #ff7700, #ffff00, #00ff88, #0088ff, #ff00cc, #ff0000);
            background-size: 300% 300%;
            animation: borderGlow 6s ease infinite alternate;
            padding: 3px;
            border-radius: 48px;
            transition: all 0.4s;
            box-shadow: 0 25px 40px -15px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.1);
        }
        .glass-card {
            background: rgba(12,12,25,0.55);
            backdrop-filter: blur(16px);
            border-radius: 46px;
            padding: 2rem 1.8rem;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .symbolic-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 0 8px rgba(255,255,200,0.6));
            animation: gentlePulse 3s infinite alternate;
        }
        h1 {
            font-size: 2.4rem;
            font-weight: 700;
            background: linear-gradient(120deg, #fff, #ffaaff, #aaffff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            animation: textShift 8s linear infinite;
        }
        .sub {
            color: rgba(255,255,245,0.9);
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
        .gradient-divider {
            width: 100px;
            height: 3px;
            background: linear-gradient(90deg, #ff3366, #33ff66, #3366ff, #ff33cc);
            margin: 1rem auto;
            border-radius: 3px;
            animation: widthPulse 2.5s infinite alternate;
        }
        .social-buttons {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            margin: 1.5rem 0;
            flex-wrap: wrap;
        }
        .social-btn {
            background: rgba(30,30,55,0.8);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 0.6rem 1rem;
            border-radius: 50px;
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .social-btn:hover {
            background: rgba(50,50,80,0.9);
            border-color: #ff66aa;
            transform: translateY(-2px);
        }
        .rgb-dots {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin: 1.5rem 0 0.5rem;
        }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff3366;
            animation: dotRGB 2s infinite alternate;
        }
        .dot:nth-child(2) { animation-delay: 0.4s; background: #33ff66; }
        .dot:nth-child(3) { animation-delay: 0.8s; background: #33aaff; }
        .dot:nth-child(4) { animation-delay: 1.2s; background: #ff66cc; }

        @keyframes borderGlow {
            0% { background-position: 0% 50%; filter: hue-rotate(0deg);}
            100% { background-position: 100% 50%; filter: hue-rotate(15deg);}
        }
        @keyframes gentlePulse {
            0% { transform: scale(0.96); text-shadow: 0 0 2px cyan;}
            100% { transform: scale(1.04); text-shadow: 0 0 20px magenta;}
        }
        @keyframes textShift {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }
        @keyframes widthPulse {
            0% { width: 60px; opacity:0.6; }
            100% { width: 140px; opacity:1; }
        }
        @keyframes dotRGB {
            0% { transform: scale(0.7); background: #ff3366; }
            100% { transform: scale(1.5); background: #ff99cc; }
        }

        /* ========= ОСНОВНОЙ ЧАТ (TELEGRAM‑STYLE) ========= */
        .messenger-container {
            width: 100%;
            max-width: 1400px;
            height: 90vh;
            margin: 1rem;
            background: rgba(18,18,35,0.55);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            border: 1px solid rgba(255,255,255,0.2);
            display: flex;
            overflow: hidden;
            position: relative;
            z-index: 10;
        }
        .chats-sidebar {
            width: 300px;
            background: rgba(0,0,0,0.3);
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
        }
        .user-header {
            padding: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #ff9966, #ff5e62);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            color: white;
            background-size: cover;
            background-position: center;
        }
        .user-info {
            flex: 1;
        }
        .username {
            font-weight: 600;
            color: white;
            font-size: 0.9rem;
        }
        .logout-btn {
            background: rgba(255,70,70,0.2);
            border: 1px solid rgba(255,100,100,0.4);
            padding: 0.3rem 0.7rem;
            border-radius: 40px;
            color: #ffb7b7;
            cursor: pointer;
            font-size: 0.75rem;
        }
        .sidebar-tabs {
            display: flex;
            padding: 0.5rem;
            gap: 0.3rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar-tab {
            flex: 1;
            background: none;
            border: none;
            padding: 0.5rem;
            border-radius: 1rem;
            color: #aaa;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
        }
        .sidebar-tab.active {
            background: rgba(59,110,255,0.3);
            color: white;
        }
        .search-box {
            padding: 0.8rem;
        }
        .search-input {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            color: white;
            outline: none;
        }
        .contacts-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }
        .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.7rem;
            border-radius: 1rem;
            cursor: pointer;
            transition: 0.1s;
        }
        .contact-item:hover, .contact-item.active {
            background: rgba(255,255,255,0.1);
        }
        .contact-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1rem;
            color: white;
            position: relative;
            background-size: cover;
            background-position: center;
        }
        .contact-status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #2ecc71;
            position: absolute;
            bottom: 2px;
            right: 2px;
            border: 2px solid #0f0f1a;
        }
        .contact-info {
            flex: 1;
        }
        .contact-name {
            font-weight: 500;
            color: #eee;
        }
        .contact-preview {
            font-size: 0.7rem;
            color: #aaa;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            padding: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0,0,0,0.2);
        }
        .back-button {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
        }
        .chat-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #555;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            background-size: cover;
        }
        .chat-info h3 {
            font-size: 1rem;
            color: white;
        }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        .message {
            display: flex;
            flex-direction: column;
            max-width: 70%;
        }
        .message.own {
            align-self: flex-end;
            align-items: flex-end;
        }
        .message-bubble {
            background: rgba(30,30,50,0.8);
            padding: 0.5rem 1rem;
            border-radius: 1.2rem;
            color: white;
            word-break: break-word;
            position: relative;
        }
        .message.own .message-bubble {
            background: linear-gradient(95deg, #3b6eff, #9a3bff);
        }
        .message-meta {
            font-size: 0.65rem;
            color: #aaa;
            margin-top: 0.2rem;
            display: flex;
            gap: 0.5rem;
        }
        .message-actions {
            position: absolute;
            top: 0;
            right: 0;
            display: none;
            gap: 5px;
            background: rgba(0,0,0,0.6);
            border-radius: 12px;
            padding: 2px 5px;
        }
        .message:hover .message-actions {
            display: flex;
        }
        .message-actions button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .message-input-area {
            padding: 1rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 0.5rem;
        }
        .message-input {
            flex: 1;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 2rem;
            padding: 0.7rem 1rem;
            color: white;
            outline: none;
        }
        .send-btn {
            background: linear-gradient(95deg, #3b6eff, #9a3bff);
            border: none;
            width: 40px;
            border-radius: 2rem;
            color: white;
            cursor: pointer;
        }
        .empty-messages {
            text-align: center;
            color: #aaa;
            padding: 2rem;
        }
        .edit-profile-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .edit-profile-content {
            background: rgba(18,18,35,0.95);
            border-radius: 2rem;
            padding: 1.5rem;
            width: 300px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .edit-profile-content input, .edit-profile-content textarea {
            width: 100%;
            margin: 0.5rem 0;
            padding: 0.5rem;
            border-radius: 1rem;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
        }
        @media (max-width: 700px) {
            .chats-sidebar { width: 80px; }
            .contact-info, .contact-preview, .user-info, .sidebar-tab span { display: none; }
            .sidebar-tab i { font-size: 1.2rem; }
            .back-button { display: block; }
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>
    <div class="overlay-dark"></div>
    <div class="rgb-orb orb1"></div>
    <div class="rgb-orb orb2"></div>
    <div class="rgb-orb orb3"></div>

    <div id="appRoot"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

        // ========== ВАШ КОНФИГ FIREBASE (ЗАМЕНИТЕ НА СВОЙ) ==========
        const firebaseConfig = {
            apiKey: "AIzaSyB1N2kfAHyYbB5-e_FN-6Is00YuaZdIhyo",
            authDomain: "nexus-flux-22800.firebaseapp.com",
            projectId: "nexus-flux-22800",
            storageBucket: "nexus-flux-22800.firebasestorage.app",
            messagingSenderId: "969830291215",
            appId: "1:969830291215:web:4e25f8b28ad0b993d9d07a",
            measurementId: "G-GMTT67V5Z1"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        // ========== ДАННЫЕ ПРИЛОЖЕНИЯ ==========
        let users = [];          // { username, provider, avatarLetter, avatarUrl, bio, displayName }
        let messages = [];       // { id, type, target, sender, text, timestamp, likes, likedBy, edited }
        let currentUser = null;
        let currentConversation = null; // { type, id }
        let activeTab = 'chats'; // chats, channels, groups

        const channels = [
            { id: 'general', name: '# general', icon: 'fa-globe' },
            { id: 'tech', name: '# tech', icon: 'fa-code' },
            { id: 'random', name: '# random', icon: 'fa-music' }
        ];

        // Хранилище
        const STORAGE_USERS = 'rgb_messenger_users';
        const STORAGE_MESSAGES = 'rgb_messenger_messages';
        const STORAGE_CURRENT_USER = 'rgb_messenger_currentUser';

        function loadData() {
            const storedUsers = localStorage.getItem(STORAGE_USERS);
            if (storedUsers) users = JSON.parse(storedUsers);
            else {
                users = [
                    { username: 'Alex_RGB', provider: 'local', avatarLetter: 'A', avatarUrl: null, bio: 'RGB lover', displayName: 'Alex RGB' },
                    { username: 'Maria_Spark', provider: 'local', avatarLetter: 'M', avatarUrl: null, bio: 'Sparkling', displayName: 'Maria' },
                    { username: 'PixelMaster', provider: 'local', avatarLetter: 'P', avatarUrl: null, bio: 'Pixel artist', displayName: 'PixelMaster' },
                    { username: 'NeonLight', provider: 'local', avatarLetter: 'N', avatarUrl: null, bio: 'Neon vibes', displayName: 'NeonLight' }
                ];
                saveUsers();
            }
            const storedMessages = localStorage.getItem(STORAGE_MESSAGES);
            if (storedMessages) messages = JSON.parse(storedMessages);
            else {
                messages = [
                    { id: Date.now()+1, type: 'channel', target: 'general', sender: 'Alex_RGB', text: 'Welcome to RGB Orbit! 🔥 Real Google login + Telegram‑style chat.', timestamp: new Date(Date.now()-7200000).toISOString(), likes: 2, likedBy: [], edited: false },
                    { id: Date.now()+2, type: 'channel', target: 'tech', sender: 'NeonLight', text: 'Anyone into WebGL?', timestamp: new Date(Date.now()-3600000).toISOString(), likes: 1, likedBy: [], edited: false },
                    { id: Date.now()+3, type: 'dm', target: 'Maria_Spark', sender: 'Alex_RGB', text: 'Hey Maria! Check out the new social login.', timestamp: new Date(Date.now()-1800000).toISOString(), likes: 0, likedBy: [], edited: false }
                ];
                saveMessages();
            }
            const savedUser = localStorage.getItem(STORAGE_CURRENT_USER);
            if (savedUser) currentUser = JSON.parse(savedUser);
            else currentUser = null;
        }
        function saveUsers() { localStorage.setItem(STORAGE_USERS, JSON.stringify(users)); }
        function saveMessages() { localStorage.setItem(STORAGE_MESSAGES, JSON.stringify(messages)); }
        function saveCurrentUser() {
            if (currentUser) localStorage.setItem(STORAGE_CURRENT_USER, JSON.stringify(currentUser));
            else localStorage.removeItem(STORAGE_CURRENT_USER);
        }

        function isUsernameUnique(username) {
            return !users.some(u => u.username.toLowerCase() === username.toLowerCase());
        }

        function createUser(username, provider, displayName = null, avatarUrl = null) {
            if (!username || username.trim() === '') return false;
            username = username.trim();
            if (!isUsernameUnique(username)) {
                alert(`Username "${username}" already taken. Choose another.`);
                return false;
            }
            const newUser = {
                username,
                provider,
                avatarLetter: username.charAt(0).toUpperCase(),
                avatarUrl: avatarUrl || null,
                bio: '',
                displayName: displayName || username
            };
            users.push(newUser);
            saveUsers();
            currentUser = newUser;
            saveCurrentUser();
            renderApp();
            return true;
        }

        // Google Login
        async function firebaseGoogleLogin() {
            try {
                const result = await signInWithPopup(auth, googleProvider);
                const user = result.user;
                let username = user.displayName?.replace(/\s/g, '_') || user.email.split('@')[0];
                let finalName = username;
                let counter = 0;
                while (!isUsernameUnique(finalName) && counter < 10) {
                    finalName = username + '_' + Math.floor(Math.random() * 1000);
                    counter++;
                }
                createUser(finalName, 'Google', user.displayName, user.photoURL);
            } catch (error) {
                alert('Google login failed: ' + error.message);
            }
        }

        // Demo social logins (Discord, GitHub, Telegram)
        function discordLogin() {
            let suggested = 'Discord_' + Math.floor(Math.random() * 1000);
            let username = prompt('✨ Discord demo login\nEnter unique username:', suggested);
            if (username) createUser(username, 'Discord');
        }
        function githubLogin() {
            let suggested = 'GitHub_' + Math.floor(Math.random() * 1000);
            let username = prompt('✨ GitHub demo login\nEnter unique username:', suggested);
            if (username) createUser(username, 'GitHub');
        }
        function telegramLogin() {
            let suggested = 'Telegram_' + Math.floor(Math.random() * 1000);
            let username = prompt('✨ Telegram demo login\nEnter unique username:', suggested);
            if (username) createUser(username, 'Telegram');
        }

        function logout() {
            currentUser = null;
            saveCurrentUser();
            renderApp();
        }

        // Сообщения
        function sendMessage(text) {
            if (!text.trim() || !currentConversation) return;
            const newMsg = {
                id: Date.now(),
                type: currentConversation.type,
                target: currentConversation.id,
                sender: currentUser.username,
                text: text.trim(),
                timestamp: new Date().toISOString(),
                likes: 0,
                likedBy: [],
                edited: false
            };
            messages.push(newMsg);
            saveMessages();
            renderCurrentChat();
            renderSidebar();
        }

        function deleteMessage(msgId) {
            const index = messages.findIndex(m => m.id === msgId);
            if (index !== -1 && messages[index].sender === currentUser.username) {
                messages.splice(index, 1);
                saveMessages();
                renderCurrentChat();
                renderSidebar();
            }
        }

        function editMessage(msgId, newText) {
            const msg = messages.find(m => m.id === msgId);
            if (msg && msg.sender === currentUser.username && newText.trim()) {
                msg.text = newText.trim();
                msg.edited = true;
                saveMessages();
                renderCurrentChat();
            }
        }

        function toggleLike(msgId) {
            const msg = messages.find(m => m.id === msgId);
            if (!msg) return;
            const userId = currentUser.username;
            if (msg.likedBy.includes(userId)) {
                msg.likedBy = msg.likedBy.filter(u => u !== userId);
                msg.likes--;
            } else {
                msg.likedBy.push(userId);
                msg.likes++;
            }
            saveMessages();
            renderCurrentChat();
        }

        function getMessagesForConversation(type, target) {
            return messages.filter(m => m.type === type && m.target === target)
                .sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
        }

        function renderCurrentChat() {
            const chatArea = document.getElementById('chatAreaDynamic');
            if (!chatArea) return;
            if (!currentConversation) {
                chatArea.innerHTML = '<div class="empty-messages">✨ Select a chat to start messaging</div>';
                return;
            }
            const msgs = getMessagesForConversation(currentConversation.type, currentConversation.id);
            let messagesHtml = '';
            if (msgs.length === 0) messagesHtml = '<div class="empty-messages">💬 No messages yet. Be the first!</div>';
            else {
                msgs.forEach(msg => {
                    const isOwn = msg.sender === currentUser.username;
                    const time = new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                    const likedClass = msg.likedBy.includes(currentUser.username) ? 'liked' : '';
                    messagesHtml += `
                        <div class="message ${isOwn ? 'own' : ''}" data-msg-id="${msg.id}">
                            <div class="message-bubble">
                                ${escapeHtml(msg.text)}${msg.edited ? ' <i style="font-size:0.7rem;">(edited)</i>' : ''}
                                <div class="message-actions">
                                    ${isOwn ? `<button class="edit-msg" data-id="${msg.id}"><i class="fas fa-edit"></i></button>` : ''}
                                    ${isOwn ? `<button class="delete-msg" data-id="${msg.id}"><i class="fas fa-trash"></i></button>` : ''}
                                    <button class="like-msg" data-id="${msg.id}"><i class="fas fa-heart ${likedClass}"></i> ${msg.likes}</button>
                                </div>
                            </div>
                            <div class="message-meta"><span>${escapeHtml(msg.sender)}</span><span>${time}</span></div>
                        </div>
                    `;
                });
            }
            let headerTitle = '';
            if (currentConversation.type === 'channel') {
                const ch = channels.find(c => c.id === currentConversation.id);
                headerTitle = ch ? ch.name : currentConversation.id;
            } else {
                headerTitle = '@' + currentConversation.id;
            }
            chatArea.innerHTML = `
                <div class="chat-header">
                    <button class="back-button" id="backBtn"><i class="fas fa-arrow-left"></i></button>
                    <div class="chat-avatar">${currentConversation.type === 'channel' ? '#' : currentConversation.id.charAt(0).toUpperCase()}</div>
                    <div class="chat-info"><h3>${escapeHtml(headerTitle)}</h3></div>
                </div>
                <div class="messages-container" id="messagesContainer">${messagesHtml}</div>
                <div class="message-input-area">
                    <input type="text" id="messageInput" class="message-input" placeholder="Type a message...">
                    <button id="sendMsgBtn" class="send-btn"><i class="fas fa-paper-plane"></i></button>
                </div>
            `;
            const input = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendMsgBtn');
            const backBtn = document.getElementById('backBtn');
            if (input && sendBtn) {
                const send = () => { if(input.value.trim()) sendMessage(input.value); input.value = ''; };
                sendBtn.onclick = send;
                input.onkeypress = (e) => { if(e.key === 'Enter') send(); };
            }
            if (backBtn) backBtn.onclick = () => { currentConversation = null; renderCurrentChat(); renderSidebar(); };
            const container = document.getElementById('messagesContainer');
            if (container) container.scrollTop = container.scrollHeight;

            // Делегирование событий на кнопки в сообщениях
            container?.addEventListener('click', (e) => {
                const deleteBtn = e.target.closest('.delete-msg');
                const editBtn = e.target.closest('.edit-msg');
                const likeBtn = e.target.closest('.like-msg');
                if (deleteBtn) {
                    const id = parseInt(deleteBtn.getAttribute('data-id'));
                    if (id) deleteMessage(id);
                }
                if (editBtn) {
                    const id = parseInt(editBtn.getAttribute('data-id'));
                    if (id) {
                        const newText = prompt('Edit message:', messages.find(m => m.id === id)?.text);
                        if (newText) editMessage(id, newText);
                    }
                }
                if (likeBtn) {
                    const id = parseInt(likeBtn.getAttribute('data-id'));
                    if (id) toggleLike(id);
                }
            });
        }

        function renderSidebar() {
            const sidebar = document.getElementById('sidebarDynamic');
            if (!sidebar) return;
            const otherUsers = users.filter(u => u.username !== currentUser.username);
            let contactsHtml = '';
            if (activeTab === 'chats') {
                otherUsers.forEach(u => {
                    const lastMsg = messages.filter(m => (m.type === 'dm' && (m.target === u.username || (m.sender === u.username && m.target === currentUser.username))))
                        .sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp))[0];
                    const preview = lastMsg ? (lastMsg.sender === currentUser.username ? 'You: ' : '') + lastMsg.text.substring(0,30) : 'New conversation';
                    const activeClass = (currentConversation && currentConversation.type === 'dm' && currentConversation.id === u.username) ? 'active' : '';
                    contactsHtml += `
                        <div class="contact-item ${activeClass}" data-type="dm" data-id="${u.username}">
                            <div class="contact-avatar" style="background-image: url('${u.avatarUrl || ''}'); background-size: cover;">${!u.avatarUrl ? u.avatarLetter : ''}</div>
                            <div class="contact-info">
                                <div class="contact-name">${escapeHtml(u.displayName || u.username)}</div>
                                <div class="contact-preview">${escapeHtml(preview)}</div>
                            </div>
                        </div>
                    `;
                });
            } else if (activeTab === 'channels') {
                channels.forEach(ch => {
                    const lastMsg = messages.filter(m => m.type === 'channel' && m.target === ch.id).sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp))[0];
                    const preview = lastMsg ? lastMsg.text.substring(0,30) : 'No messages yet';
                    const activeClass = (currentConversation && currentConversation.type === 'channel' && currentConversation.id === ch.id) ? 'active' : '';
                    contactsHtml += `
                        <div class="contact-item ${activeClass}" data-type="channel" data-id="${ch.id}">
                            <div class="contact-avatar" style="background:#3b6eff;">#</div>
                            <div class="contact-info">
                                <div class="contact-name">${ch.name}</div>
                                <div class="contact-preview">${escapeHtml(preview)}</div>
                            </div>
                        </div>
                    `;
                });
            } else {
                contactsHtml = `<div class="empty-messages" style="text-align:center; padding:1rem;">👥 Groups coming soon</div>`;
            }

            sidebar.innerHTML = `
                <div class="user-header">
                    <div class="avatar" style="background-image: url('${currentUser.avatarUrl || ''}'); background-size: cover;">${!currentUser.avatarUrl ? currentUser.avatarLetter : ''}</div>
                    <div class="user-info">
                        <div class="username">@${currentUser.username}</div>
                    </div>
                    <button id="logoutSidebarBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i></button>
                    <button id="editProfileBtn" class="logout-btn" style="margin-left:5px;"><i class="fas fa-user-edit"></i></button>
                </div>
                <div class="sidebar-tabs">
                    <button class="sidebar-tab ${activeTab === 'chats' ? 'active' : ''}" data-tab="chats"><i class="fas fa-comment"></i><span> Chats</span></button>
                    <button class="sidebar-tab ${activeTab === 'channels' ? 'active' : ''}" data-tab="channels"><i class="fas fa-bullhorn"></i><span> Channels</span></button>
                    <button class="sidebar-tab ${activeTab === 'groups' ? 'active' : ''}" data-tab="groups"><i class="fas fa-users"></i><span> Groups</span></button>
                </div>
                <div class="search-box"><input type="text" class="search-input" id="searchInput" placeholder="Search..."></div>
                <div class="contacts-list" id="contactsList">${contactsHtml}</div>
            `;

            document.querySelectorAll('.sidebar-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    activeTab = tab.getAttribute('data-tab');
                    renderSidebar();
                });
            });
            document.querySelectorAll('.contact-item').forEach(el => {
                el.addEventListener('click', () => {
                    const type = el.getAttribute('data-type');
                    const id = el.getAttribute('data-id');
                    if (type && id) { currentConversation = { type, id }; renderCurrentChat(); renderSidebar(); }
                });
            });
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    const term = e.target.value.toLowerCase();
                    document.querySelectorAll('.contact-item').forEach(item => {
                        const name = item.querySelector('.contact-name')?.innerText.toLowerCase() || '';
                        item.style.display = name.includes(term) ? 'flex' : 'none';
                    });
                });
            }
            const logoutBtn = document.getElementById('logoutSidebarBtn');
            if (logoutBtn) logoutBtn.onclick = () => { currentUser = null; saveCurrentUser(); renderApp(); };
            const editBtn = document.getElementById('editProfileBtn');
            if (editBtn) editBtn.onclick = () => showEditProfileModal();
        }

        function showEditProfileModal() {
            const modal = document.createElement('div');
            modal.className = 'edit-profile-modal';
            modal.innerHTML = `
                <div class="edit-profile-content">
                    <h3>Edit Profile</h3>
                    <input type="text" id="editDisplayName" placeholder="Display name" value="${escapeHtml(currentUser.displayName || '')}">
                    <textarea id="editBio" placeholder="Bio" rows="2">${escapeHtml(currentUser.bio || '')}</textarea>
                    <input type="text" id="editAvatarUrl" placeholder="Avatar URL (optional)" value="${currentUser.avatarUrl || ''}">
                    <button id="saveProfileEdit" class="social-btn" style="margin-top:10px;">Save</button>
                    <button id="closeModal" class="social-btn" style="margin-top:5px;">Cancel</button>
                </div>
            `;
            document.body.appendChild(modal);
            document.getElementById('saveProfileEdit')?.addEventListener('click', () => {
                currentUser.displayName = document.getElementById('editDisplayName').value;
                currentUser.bio = document.getElementById('editBio').value;
                currentUser.avatarUrl = document.getElementById('editAvatarUrl').value;
                if (!currentUser.avatarUrl) currentUser.avatarUrl = null;
                saveCurrentUser();
                // обновить пользователя в массиве users
                const idx = users.findIndex(u => u.username === currentUser.username);
                if (idx !== -1) users[idx] = currentUser;
                saveUsers();
                modal.remove();
                renderSidebar();
                renderCurrentChat();
            });
            document.getElementById('closeModal')?.addEventListener('click', () => modal.remove());
        }

        function renderMessenger() {
            return `<div class="messenger-container"><div class="chats-sidebar" id="sidebarDynamic"></div><div class="chat-area" id="chatAreaDynamic"></div></div>`;
        }

        function renderRegistration() {
            return `
                <div class="glass-stage">
                    <div class="rgb-border-wrap">
                        <div class="glass-card">
                            <div class="symbolic-icon">✦</div>
                            <h1>RGB Orbit</h1>
                            <div class="sub">Telegram‑style • Firebase Google Login</div>
                            <div class="gradient-divider"></div>
                            <div class="social-buttons">
                                <div id="googleLoginBtn" class="social-btn"><i class="fab fa-google"></i> Google</div>
                                <div id="discordLogin" class="social-btn"><i class="fab fa-discord"></i> Discord</div>
                                <div id="telegramLogin" class="social-btn"><i class="fab fa-telegram"></i> Telegram</div>
                                <div id="githubLogin" class="social-btn"><i class="fab fa-github"></i> GitHub</div>
                            </div>
                            <div class="rgb-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                            <div style="font-size:0.7rem; opacity:0.7; margin-top:1rem;">✨ Google (real) • Others demo ✨</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderApp() {
            const appDiv = document.getElementById('appRoot');
            if (!currentUser) {
                appDiv.innerHTML = renderRegistration();
                document.getElementById('googleLoginBtn')?.addEventListener('click', firebaseGoogleLogin);
                document.getElementById('discordLogin')?.addEventListener('click', discordLogin);
                document.getElementById('telegramLogin')?.addEventListener('click', telegramLogin);
                document.getElementById('githubLogin')?.addEventListener('click', githubLogin);
            } else {
                appDiv.innerHTML = renderMessenger();
                renderSidebar();
                if (!currentConversation) {
                    currentConversation = { type: 'channel', id: 'general' };
                    renderCurrentChat();
                    renderSidebar();
                } else renderCurrentChat();
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
        }

        loadData();
        renderApp();
    </script>
</body>
</html>
